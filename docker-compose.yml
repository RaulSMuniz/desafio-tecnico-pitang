services:
  db:
    image: postgres:16
    container_name: pitang-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pitangdb
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: packages/pitang-backend/Dockerfile
    container_name: pitang-backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/pitangdb?schema=public
      - JWT_SECRET=12345678
      - BACKEND_URL=0.0.0.0:3333
      - TZ=America/Sao_Paulo
    ports:
      - "3333:3333"
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3333/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./packages/pitang-backend:/app/packages/pitang-backend
      - ./packages/pitang-frontend:/app/packages/pitang-frontend
      - /app/packages/pitang-backend/node_modules
      - /app/packages/pitang-frontend/node_modules
    # Garante que as migrations e os seeds rodem antes de iniciar
    command: sh -c "npx prisma migrate dev --name init && npx prisma db seed && npm run dev"

  frontend:
    build:
      context: .
      dockerfile: packages/pitang-frontend/Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:3333
    container_name: pitang-frontend
    environment:
      - TZ=America/Sao_Paulo
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
